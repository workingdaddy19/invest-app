# mlflow-auth Secret 템플릿
# ※ 이 파일을 직접 apply 하지 말고, 아래 kubectl 명령으로 생성하세요.
#
# kubectl create secret generic mlflow-auth \
#   --from-literal=username=<mlflow-username> \
#   --from-literal=password=<mlflow-password> \
#   -n invest-inference
#
# 실제 username/password 는 MLflow 관리자에게 확인하세요.
apiVersion: v1
kind: Secret
metadata:
  name: mlflow-auth
  namespace: invest-inference
type: Opaque
stringData:
  username: "<MLFLOW_USERNAME>"
  password: "<MLFLOW_PASSWORD>"
